
  name: Auto Release on Merge

  on:
    push:
      branches:
        - main

  jobs:
    publish-release:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Setup JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: gradle

        - name: Grant Permission to Gradle
          run: chmod +x ./gradlew

        - name: Create google-services.json
          run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

        - name: Build Release APK
          env:
            SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
            SUPPORT_1: ${{ secrets.SUPPORT_1 }}
            SUPPORT_5: ${{ secrets.SUPPORT_5 }}
            SUPPORT_10: ${{ secrets.SUPPORT_10 }}
            SUPPORT_25: ${{ secrets.SUPPORT_25 }}
            SUPPORT_100: ${{ secrets.SUPPORT_100 }}
          run: ./gradlew assembleRelease

        - name: Sign APK
          uses: r0adkll/sign-android-release@v1
          id: sign_app
          with:
            releaseDirectory: app/build/outputs/apk/release
            signingKeyBase64: ${{ secrets.SIGNING_KEY }}
            alias: ${{ secrets.ALIAS }}
            keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
            keyPassword: ${{ secrets.KEY_PASSWORD }}

        - name: Create GitHub Release
          uses: softprops/action-gh-release@v1
          with:
            tag_name: v1.0.${{ github.run_number }}
            name: "Release v1.0.${{ github.run_number }}"
            files: ${{ steps.sign_app.outputs.signedReleaseFile }}
            generate_release_notes: true
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
