name: CI Build Check

on:
  pull_request:
    types: [ opened, edited, synchronize, reopened ]
    branches:

      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Permission to Gradle
        run: chmod +x ./gradlew

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          mkdir -p app/
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json

      - name: Build Project
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPPORT_1: ${{ secrets.SUPPORT_1 }}
          SUPPORT_5: ${{ secrets.SUPPORT_5 }}
          SUPPORT_10: ${{ secrets.SUPPORT_10 }}
          SUPPORT_25: ${{ secrets.SUPPORT_25 }}
          SUPPORT_100: ${{ secrets.SUPPORT_100 }}
        run: ./gradlew assembleDebug --build-cache