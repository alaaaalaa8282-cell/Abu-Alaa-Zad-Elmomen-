name: Build & Release APK - ابو علاء (زاد المؤمن)

on:
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create google-services.json
        run: |
          mkdir -p app/
          cat > app/google-services.json << 'GEOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "abueltaweel-placeholder",
              "storage_bucket": "abueltaweel-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.abueltaweel"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyPlaceholderKeyForBuildOnly00000000"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GEOF

      - name: Build Debug APK
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder_key_for_build_only
        run: ./gradlew assembleDebug

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "ابو علاء (زاد المؤمن) - إصدار ${{ github.run_number }}"
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
